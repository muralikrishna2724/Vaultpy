{% extends "base.html" %}
{% block title %} — Add Entry{% endblock %}

{% block head %}
<style>
  .form-wrap {
    max-width: 520px; margin: 3rem auto; padding: 0 1.5rem;
  }

  .back-link {
    display: inline-flex; align-items: center; gap: 0.4rem;
    color: var(--muted); font-size: 0.85rem; text-decoration: none;
    margin-bottom: 1.5rem; transition: color 0.15s;
  }
  .back-link:hover { color: var(--text); }

  .form-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 2rem;
  }

  .form-title {
    font-size: 1.3rem; font-weight: 800; letter-spacing: -0.02em;
    margin-bottom: 1.5rem;
  }

  .pw-field { position: relative; }
  .pw-field input { padding-right: 3rem; }
  .gen-btn {
    position: absolute; right: 0.75rem; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 1rem;
    transition: color 0.15s;
  }
  .gen-btn:hover { color: var(--accent2); }

  .strength-bar {
    height: 3px; border-radius: 2px; margin-top: 0.4rem;
    background: var(--border); overflow: hidden;
  }
  .strength-fill {
    height: 100%; border-radius: 2px;
    transition: width 0.3s, background 0.3s;
  }

  .submit-btn {
    width: 100%; padding: 0.85rem;
    font-family: var(--sans); font-weight: 700; font-size: 0.95rem;
    background: linear-gradient(135deg, var(--accent), #9b87ff);
    color: #fff; border: none; border-radius: 10px; cursor: pointer;
    transition: all 0.15s; margin-top: 0.5rem;
  }
  .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,106,255,0.4); }
</style>
{% endblock %}

{% block nav %}
<nav>
  <div class="logo">
    <div class="logo-icon">🔐</div>
    VaultPy
  </div>
  <div class="nav-actions">
    <a href="/lock" class="btn btn-ghost">Lock</a>
  </div>
</nav>
{% endblock %}

{% block content %}
<div class="form-wrap">
  <a href="/dashboard" class="back-link">← Back to vault</a>

  <div class="form-card">
    <div class="form-title">Add New Entry</div>

    <form method="POST" action="/add">
      <div class="field">
        <label>Title</label>
        <input type="text" name="title" placeholder="e.g. GitHub, Gmail..." required />
      </div>

      <div class="field">
        <label>Username / Email</label>
        <input type="text" name="username" placeholder="alice@example.com" />
      </div>

      <div class="field">
        <label>Password</label>
        <div class="pw-field">
          <input type="text" name="password" id="pwInput"
                 placeholder="Password..." required oninput="checkStrength(this.value)" />
          <button type="button" class="gen-btn" title="Generate password" onclick="genPassword()">⚡</button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strengthBar"></div></div>
      </div>

      <div class="field">
        <label>URL <span style="text-transform:none;font-weight:400;color:var(--muted)">(optional)</span></label>
        <input type="url" name="url" placeholder="https://..." />
      </div>

      <div class="field">
        <label>Notes <span style="text-transform:none;font-weight:400;color:var(--muted)">(optional)</span></label>
        <textarea name="notes" rows="3" placeholder="Any additional notes..."></textarea>
      </div>

      <button type="submit" class="submit-btn">Save to Vault →</button>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  // Simple password strength indicator
  function checkStrength(pw) {
    const bar = document.getElementById("strengthBar");
    let score = 0;
    if (pw.length >= 8)  score++;
    if (pw.length >= 14) score++;
    if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
    if (/\d/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;

    const colors = ["", "#ff4f6a", "#ff9a3c", "#f5c400", "#7c6aff", "#00e5a0"];
    const widths  = ["0%", "20%", "40%", "60%", "80%", "100%"];
    bar.style.width      = widths[score] || "0%";
    bar.style.background = colors[score] || "transparent";
  }

  // Password generator
  function genPassword() {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";
    let pw = "";
    const arr = new Uint8Array(20);
    crypto.getRandomValues(arr);
    arr.forEach(b => { pw += chars[b % chars.length]; });
    const inp = document.getElementById("pwInput");
    inp.value = pw;
    checkStrength(pw);
  }
</script>
{% endblock %}
