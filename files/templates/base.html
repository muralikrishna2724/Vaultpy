<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VaultPy{% block title %}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #111118;
      --surface2:  #1a1a24;
      --border:    #2a2a3a;
      --accent:    #7c6aff;
      --accent2:   #00e5a0;
      --danger:    #ff4f6a;
      --text:      #e8e8f0;
      --muted:     #6b6b85;
      --mono:      'DM Mono', monospace;
      --sans:      'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* noise overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
    }

    .logo {
      font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em;
      color: var(--text);
      display: flex; align-items: center; gap: 0.5rem;
    }

    .logo-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    .nav-actions { display: flex; gap: 0.75rem; align-items: center; }

    .btn {
      font-family: var(--sans); font-weight: 600; font-size: 0.85rem;
      padding: 0.5rem 1.1rem; border-radius: 8px; border: none;
      cursor: pointer; text-decoration: none; display: inline-flex;
      align-items: center; gap: 0.4rem;
      transition: all 0.15s ease;
    }

    .btn-primary {
      background: var(--accent); color: #fff;
    }
    .btn-primary:hover { background: #6b59ee; transform: translateY(-1px); }

    .btn-ghost {
      background: transparent; color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

    .btn-danger {
      background: transparent; color: var(--danger);
      border: 1px solid transparent;
      padding: 0.3rem 0.6rem; font-size: 0.75rem;
    }
    .btn-danger:hover { background: rgba(255,79,106,0.12); border-color: var(--danger); }

    main { position: relative; z-index: 1; }

    input, textarea {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-family: var(--mono); font-size: 0.9rem;
      padding: 0.7rem 1rem; border-radius: 8px; width: 100%;
      transition: border-color 0.15s;
      outline: none;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    label {
      display: block; font-size: 0.78rem; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 0.4rem;
    }

    .field { margin-bottom: 1.2rem; }

    .tag {
      font-family: var(--mono); font-size: 0.7rem;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); padding: 0.15rem 0.5rem; border-radius: 4px;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  {% block nav %}{% endblock %}
  <main>{% block content %}{% endblock %}</main>
  {% block scripts %}{% endblock %}
</body>
</html>
